# Variable: --ENRTPT
# Condition: --ENTPT ^= null
# Rule: --ENRTPT ^= null
Authorities:
  - Organization: CDISC
    Standards:
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: The description or date and/or time of a time point that acts as
                  a fixed reference for characterizing the end of an
                  observation. This is the sponsor-defined reference point
                  referred to by --ENRTPT.
                Document: Model v2.0
                Item: --ENTPT
                Section: Timing
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0045
              Version: '1'
            Version: '2.0'
        Version: '3.4'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: Identifies the end of the observation as being before or after
                  the sponsor-defined reference time point defined by variable
                  --ENTPT.
                Document: Model v1.7
                Item: Table 2.2.5.1 --ENTPT
                Section: 2.2.5 Timing Variables for All Classes
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0045
              Version: '1'
            Version: '2.0'
        Version: '3.3'
      - Name: SDTMIG
        References:
          - Citations:
              - Cited Guidance: (--ENRTPT) Identifies the end of the observation as being before
                  or after the sponsor-defined reference time point defined by
                  variable --ENTPT.
                Document: Model v1.4
                Item: Specification
                Section: 2.2.5 Timing Variables for All Classes
            Origin: SDTM and SDTMIG Conformance Rules
            Rule Identifier:
              Id: CG0045
              Version: '1'
            Version: '2.0'
        Version: '3.2'
Check:
  all:
    - name: --ENTPT
      operator: non_empty
    - name: --ENRTPT
      operator: empty
Core:
  Id: CORE-000106
  Status: Published
  Version: '1'
Description: Raise an error when --ENTPT is populated and --ENRTPT is not populated.
Executability: Fully Executable
Outcome:
  Message: --ENTPT is populated, but --ENRTPT is not populated.
  Output Variables:
    - --ENRTPT
    - --ENTPT
Rule Type: Record Data
Scope:
  Classes:
    Include:
      - ALL
  Domains:
    Include:
      - ALL
Sensitivity: Record